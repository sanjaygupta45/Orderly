spring.application.name=api-gateway
server.port=8080

# --- Shared HS256 secret used to validate JWTs at the edge ---
jwt.signingKey=${JWT_SIGNING_KEY:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347499}

# --- Redis (backs the rate limiter); native local Redis has no password ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# --- Downstream service URIs (override with env in Docker, e.g. http://order-service:8083) ---
orderflow.routes.auth-uri=${AUTH_URI:http://localhost:8081}
orderflow.routes.product-uri=${PRODUCT_URI:http://localhost:8084}
orderflow.routes.order-uri=${ORDER_URI:http://localhost:8083}
orderflow.routes.inventory-uri=${INVENTORY_URI:http://localhost:8082}
orderflow.routes.payment-uri=${PAYMENT_URI:http://localhost:8085}
orderflow.routes.notification-uri=${NOTIFICATION_URI:http://localhost:8086}

# --- Rate limiter (token bucket): refill per second + burst ---
orderflow.ratelimit.replenish-rate=${RATE_REPLENISH:10}
orderflow.ratelimit.burst-capacity=${RATE_BURST:20}

management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway
management.endpoint.health.show-details=always

# JSON logs when LOG_FORMAT=ecs (e.g. in Docker); human-readable otherwise.
logging.structured.format.console=${LOG_FORMAT:}
logging.level.root=INFO
logging.level.com.orderflow.gateway=DEBUG
