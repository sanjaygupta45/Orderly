spring.application.name=payment-service
server.port=8085

# --- Database (payment-service owns its own schema) ---
spring.datasource.url=jdbc:mysql://localhost:3308/payment_service
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- RabbitMQ ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=orderflow
spring.rabbitmq.password=orderflow
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10000

# --- Payment simulation ---
# mode: RANDOM | ALWAYS_SUCCESS | ALWAYS_FAIL (override with PAYMENT_MODE env to demo compensation)
orderflow.payment.mode=${PAYMENT_MODE:RANDOM}
orderflow.payment.success-rate=${PAYMENT_SUCCESS_RATE:0.8}

# --- Outbox relay poll interval (ms) ---
orderflow.outbox.poll-delay-ms=1000

# --- Actuator / metrics ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# --- Eureka ---
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- Logging ---
logging.level.root=INFO
logging.level.com.orderflow.payment=DEBUG
