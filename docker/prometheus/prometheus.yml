# Prometheus scrape configuration for OrderFlow.
# During local dev the Spring services run on the host, so we scrape them via
# host.docker.internal. Once services are dockerized (Phase 6) these targets
# become the container names on the orderflow-net network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Actuator exposes metrics at /actuator/prometheus.
  - job_name: 'orderflow-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8080'   # api-gateway
          - 'host.docker.internal:8081'   # auth-service
          - 'host.docker.internal:8082'   # inventory-service
          - 'host.docker.internal:8083'   # order-service
          - 'host.docker.internal:8084'   # product-service
          - 'host.docker.internal:8085'   # payment-service
          - 'host.docker.internal:8086'   # notification-service
