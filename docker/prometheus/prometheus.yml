# Prometheus scrape configuration for OrderFlow.
# Targets are the service container names on the orderflow-net network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Most services expose metrics at /actuator/prometheus (root context).
  - job_name: 'orderflow'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'api-gateway:8080'
          - 'inventory-service:8082'
          - 'order-service:8083'
          - 'product-service:8084'
          - 'payment-service:8085'
          - 'notification-service:8086'

  # auth-service keeps context-path=/api, so its metrics live under /api/actuator/prometheus.
  - job_name: 'orderflow-auth'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
