spring.application.name=order-service
server.port=8083

# --- Database (order-service owns its own schema) ---
spring.datasource.url=jdbc:mysql://localhost:3308/order_service
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- RabbitMQ ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=orderflow
spring.rabbitmq.password=orderflow
# Listener retry: try 3 times with backoff, then dead-letter (do not requeue).
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10000


# --- JWT (shared HS256 secret; validates tokens issued by auth-service) ---
jwt.signingKey=${JWT_SIGNING_KEY:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347499}

# --- Actuator / metrics ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always


# --- Logging ---
# JSON logs when LOG_FORMAT=ecs (e.g. in Docker); human-readable otherwise. Correlation id shown either way.
logging.structured.format.console=${LOG_FORMAT:}
logging.pattern.correlation=[%X{correlationId:-}]
logging.level.root=INFO
logging.level.com.orderflow.order=DEBUG
