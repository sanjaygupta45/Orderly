spring.application.name=auth-service

# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3308/auth_service
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT Configuration (HS256 secret shared with the gateway and resource services)
jwt.signingKey=${JWT_SIGNING_KEY:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347499}

# Actuator / metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Logging
# JSON logs when LOG_FORMAT=ecs (e.g. in Docker); human-readable otherwise.
logging.structured.format.console=${LOG_FORMAT:}
logging.level.root=INFO
logging.level.com.orderflow.auth=DEBUG
