# OrderFlow — full platform. One command brings up everything:
name: orderflow

# Shared env: services reach infra by container name; JSON logs via LOG_FORMAT=ecs.
# (DB/RabbitMQ/Redis credentials already match the infra defaults in each service.)
x-common-env: &common-env
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PASSWORD: redis
  LOG_FORMAT: ecs

# Wait for backing services to be healthy before starting.
x-infra-deps: &infra-deps
  mysql:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  # ----------------------------- infrastructure -----------------------------
  mysql:
    image: mysql:8.4
    container_name: orderflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [orderflow-net]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: orderflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: orderflow
      RABBITMQ_DEFAULT_PASS: orderflow
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [orderflow-net]

  redis:
    image: redis:7.4-alpine
    container_name: orderflow-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "redis"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [orderflow-net]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: orderflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [orderflow-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: orderflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [orderflow-net]

  # ------------------------------- services ---------------------------------
  auth-service:
    build:
      context: .
      args:
        SERVICE: auth-service
    image: orderflow/auth-service
    container_name: orderflow-auth
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_service
    depends_on: *infra-deps
    ports:
      - "8081:8081"
    networks: [orderflow-net]

  product-service:
    build:
      context: .
      args:
        SERVICE: product-service
    image: orderflow/product-service
    container_name: orderflow-product
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/product_service
    depends_on: *infra-deps
    ports:
      - "8084:8084"
    networks: [orderflow-net]

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    image: orderflow/order-service
    container_name: orderflow-order
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_service
    depends_on: *infra-deps
    ports:
      - "8083:8083"
    networks: [orderflow-net]

  inventory-service:
    build:
      context: .
      args:
        SERVICE: inventory-service
    image: orderflow/inventory-service
    container_name: orderflow-inventory
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventory_service
    depends_on: *infra-deps
    ports:
      - "8082:8082"
    networks: [orderflow-net]

  payment-service:
    build:
      context: .
      args:
        SERVICE: payment-service
    image: orderflow/payment-service
    container_name: orderflow-payment
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_service
      PAYMENT_MODE: RANDOM
    depends_on: *infra-deps
    ports:
      - "8085:8085"
    networks: [orderflow-net]

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    image: orderflow/notification-service
    container_name: orderflow-notification
    restart: unless-stopped
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notification_service
    depends_on: *infra-deps
    ports:
      - "8086:8086"
    networks: [orderflow-net]

  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    image: orderflow/api-gateway
    container_name: orderflow-gateway
    restart: unless-stopped
    environment:
      <<: *common-env
      AUTH_URI: http://auth-service:8081
      PRODUCT_URI: http://product-service:8084
      ORDER_URI: http://order-service:8083
      INVENTORY_URI: http://inventory-service:8082
      PAYMENT_URI: http://payment-service:8085
      NOTIFICATION_URI: http://notification-service:8086
    depends_on: *infra-deps
    ports:
      - "8080:8080"
    networks: [orderflow-net]

networks:
  orderflow-net:
    driver: bridge

volumes:
  mysql-data:
  rabbitmq-data:
  redis-data:
  prometheus-data:
  grafana-data:
