spring.application.name=product-service
server.port=8084

# --- Database (product-service owns its own schema; migrated from MongoDB to MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3308/product_service
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- JWT (shared HS256 secret; validates tokens issued by auth-service) ---
jwt.signingKey=${JWT_SIGNING_KEY:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347499}

# --- Actuator / metrics ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always


# --- Logging ---
# JSON logs when LOG_FORMAT=ecs (e.g. in Docker); human-readable otherwise.
logging.structured.format.console=${LOG_FORMAT:}
logging.level.root=INFO
logging.level.com.orderflow.product=DEBUG
